<!-- Begin Metrics Cards -->
<div class="row">
    <div class="col-12">
        <div class="row" id="counts-metrics">
            <div class="info-box bg-primary col-md-6">
                <span class="info-box-icon"><i class="fas fa-file-alt"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">Notes</span>
                    <span class="info-box-number">{{ '{:,}'.format(note_metrics.note_count) if note_metrics.note_count else 0 }}</span>
                </div>
            </div>
            <div class="info-box bg-secondary col-md-6">
                <span class="info-box-icon"><i class="fas fa-robot"></i></span>
                <div class="info-box-content">
                    <span class="info-box-text">AI Fix Count</span>
                    <span class="info-box-number">{{ '{:,}'.format(note_metrics.ai_fix_count if note_metrics.ai_fix_count else 0)}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- End Metrics Cards -->
