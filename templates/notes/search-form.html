<div class="col-md-12">
    <div class="card card-primary collapsed-card">
        <div class="card-header">
            <h3 class="card-title">Search Form</h3>
            <div class="card-tools">
                <button type="button" class="btn btn-tool" data-card-widget="collapse"><i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
        <div class="card-body">
            <!-- Begin Search Form -->
            <form id="notes-search-form" hx-get="/notes/pagination" hx-trigger="submit" hx-target="#notes-data" hx-indicator=".htmx-indicator">
                <div class="row">
                    <div class="col-md-4">
                        <label for="search_term">Text Search</label>
                        <input id="search_term" class="form-control" type="search" name="search_term"
                            placeholder="Search note content and summary...">
                    </div>
                    <div class="col-md-4">
                        <label for="mood">Mood</label>
                        <select id="mood" class="form-control" name="mood">
                            <option value="">Select Mood</option>
                            <option value="positive">Positive</option>
                            <option value="neutral">Neutral</option>
                            <option value="negative">Negative</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </div>
                <!-- Tags and date range -->
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label>Tags</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="tag-input"
                                   list="tags-datalist"
                                   placeholder="Type to search tags...">
                            <datalist id="tags-datalist"></datalist>
                            <div class="input-group-append">
                                <button type="button" class="btn btn-secondary" id="add-tag-btn">Add</button>
                            </div>
                        </div>
                        <div id="selected-tags" class="mt-2 d-flex flex-wrap"></div>
                        <div id="tag-hidden-inputs"></div>
                    </div>
                    <div class="col-md-3">
                        <label for="start_date">From Date</label>
                        <input id="start_date" class="form-control" type="date" name="start_date"
                            placeholder="From Date">
                    </div>
                    <div class="col-md-3">
                        <label for="end_date">To Date</label>
                        <input id="end_date" class="form-control" type="date" name="end_date"
                            placeholder="To Date">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-warning" type="button" id="resetButton">Reset</button>
                    </div>
                </div>
            </form>
            <!-- End Search Form -->
        </div>
    </div>
</div>

<script>
(function () {
    // Populate datalist with user's existing tags
    fetch('/notes/tags')
        .then(function (r) { return r.json(); })
        .then(function (tags) {
            var dl = document.getElementById('tags-datalist');
            tags.forEach(function (tag) {
                var opt = document.createElement('option');
                opt.value = tag;
                dl.appendChild(opt);
            });
        })
        .catch(function () {});

    var selectedTags = new Set();

    function addTag() {
        var input = document.getElementById('tag-input');
        var tag = input.value.trim().toLowerCase();
        if (tag && !selectedTags.has(tag)) {
            selectedTags.add(tag);
            renderTags();
        }
        input.value = '';
    }

    function removeTag(tag) {
        selectedTags.delete(tag);
        renderTags();
    }

    function renderTags() {
        var badges = document.getElementById('selected-tags');
        var inputs = document.getElementById('tag-hidden-inputs');
        badges.innerHTML = '';
        inputs.innerHTML = '';
        selectedTags.forEach(function (tag) {
            var badge = document.createElement('span');
            badge.className = 'badge badge-info mr-1 mb-1';
            badge.style.fontSize = '0.9em';
            badge.style.padding = '6px 8px';
            var text = document.createTextNode(tag + ' ');
            var x = document.createElement('span');
            x.innerHTML = '&times;';
            x.style.cursor = 'pointer';
            x.setAttribute('data-tag', tag);
            x.addEventListener('click', function () { removeTag(this.getAttribute('data-tag')); });
            badge.appendChild(text);
            badge.appendChild(x);
            badges.appendChild(badge);

            var hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = 'tags';
            hidden.value = tag;
            inputs.appendChild(hidden);
        });
    }

    document.getElementById('add-tag-btn').addEventListener('click', addTag);

    document.getElementById('tag-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addTag();
        }
    });

    document.getElementById('resetButton').addEventListener('click', function () {
        document.getElementById('notes-search-form').reset();
        selectedTags.clear();
        renderTags();
    });
})();
</script>
