<div class="notif-item mb-2 rounded p-2{% if n.is_read %} opacity-50{% endif %}
    {% if n.category == 'error' %}bg-danger{% elif n.category == 'ai' %}bg-info{% else %}bg-secondary{% endif %}"
    style="{% if n.is_read %}opacity:0.5{% endif %}">
    <div class="d-flex justify-content-between align-items-start">
        <small class="text-white-50">
            {% if n.category == 'ai' %}<i class="fas fa-robot mr-1"></i>
            {% elif n.category == 'error' %}<i class="fas fa-exclamation-triangle mr-1"></i>
            {% else %}<i class="fas fa-info-circle mr-1"></i>{% endif %}
            {{ n.date_created }}
        </small>
        {% if show_all %}
            {% if n.is_read %}
            <button class="btn btn-link btn-sm p-0 text-white-50"
                    hx-post="/notifications/{{ n.pkid }}/unread"
                    hx-target="closest .notif-item"
                    hx-swap="outerHTML"
                    title="Mark unread">&#8617;</button>
            {% else %}
            <button class="btn btn-link btn-sm p-0 text-white"
                    hx-post="/notifications/{{ n.pkid }}/read?show_all=true"
                    hx-target="closest .notif-item"
                    hx-swap="outerHTML"
                    title="Mark read">&#10003;</button>
            {% endif %}
        {% else %}
        <button class="btn btn-link btn-sm p-0 text-white"
                hx-post="/notifications/{{ n.pkid }}/read"
                hx-target="closest .notif-item"
                hx-swap="outerHTML"
                title="Mark read">&times;</button>
        {% endif %}
    </div>
    <p class="mb-1 small text-white">{{ n.message }}</p>
    {% if n.note_id %}
    <a href="/notes/view/{{ n.note_id }}" class="small text-white-50">View note &rarr;</a>
    {% endif %}
</div>
